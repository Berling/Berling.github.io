<!DOCTYPE html>
<html>

<head>
    <title>Vinyl4Charity e.V.</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caprasimo&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <script type="text/javascript" src="script.js"></script>
</head>

<body>
    <div id="modal" , onclick="closeMenu();"></div>

    <nav class="topnav">
        <a href="javascript:void(0);" class="icon" onclick="toggleMenu();">
            <i class="fa fa-bars"></i>
        </a>
        <div id="menu">
            <div id="logo-wrapper">
                <img id="logo" src="img/logo.svg" alt="logo">
            </div>
            <div id="links">
                <a href="#home" onclick="closeMenu();">Home</a>
                <a href="#about" onclick="closeMenu();">About</a>
                <a href="#events" onclick="closeMenu();">Events</a>
                <a href="#bands" onclick="closeMenu();">Bands</a>
                <a href="#donations" onclick="closeMenu();">Spenden</a>
            </div>
            <div class="social-media">
                <a href="https://www.facebook.com/vinyl4charity/?locale=de_DE" target="_blank">
                    <i class="fa fa-facebook-f"></i>
                </a>
                <a href="https://www.instagram.com/vinyl.4charity/" target="_blank">
                    <i class="fa fa-instagram"></i>
                </a>
            </div>
        </div>
    </nav>

    <section id="home">
        <div class="background-image-wrapper">
            <div class="background-image"></div>
            <div id="logo-main">
                <img src="img/logo_white.svg" alt="logo_white">
            </div>
        </div>
    </section>

    <section id="about">
        <h2>About</h2>
        <hr>
    </section>

    <section id="events">
        <h2>Events</h2>
        <hr>
    </section>

    <section id="bands">
        <h2>Bands</h2>
        <hr>
        <div class="vertical-flex-container">
            <h3>Durften wir bereits begrüßen:</h3>
            <p id="band-list"></p>
        </div>
    </section>

    <section id="donations">
        <h2>Spenden</h2>
        <hr>
        <div class="vertical-flex-container">
            <h3>Bisherige Spendenempfänger:</h3>
            <ul id="donation-list"></ul>
        </div>
    </section>

    <footer>

    </footer>
</body>

</html>
